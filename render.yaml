services:
  # Backend Node.js
  - type: web
    name: secretaria-vendas-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: secretaria-vendas-db
          property: connectionString

  # Frontend React (build estático)
  - type: web
    name: secretaria-vendas-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://secretaria-vendas-backend.onrender.com/api

databases:
  - name: secretaria-vendas-db
    databaseName: secretaria_vendas
    plan: free
